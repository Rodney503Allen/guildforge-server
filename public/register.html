<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Guildforge | Register</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&display=swap" rel="stylesheet">

  <style>
    *{ box-sizing:border-box; margin:0; padding:0; }

    :root{
      --bg0:#07090c;
      --bg1:#0b0f14;
      --panel:#0e131a;
      --panel2:#0a0f15;

      --ink:#d7dbe2;
      --muted:#9aa3af;

      --iron:#2b3440;
      --ember:#b64b2e;
      --blood:#7a1e1e;
      --bone:#c9b89a;

      --shadow: rgba(0,0,0,.60);
      --frame: rgba(255,255,255,.04);
      --glass: rgba(0,0,0,.18);
    }

    body{
      min-height:100vh;
      color: var(--ink);
      font-family: 'Cinzel', ui-serif, Georgia, "Times New Roman", serif;

      display:grid;
      place-items:center;

      background:
        radial-gradient(1100px 600px at 18% 0%, rgba(182,75,46,.12), transparent 60%),
        radial-gradient(900px 500px at 82% 10%, rgba(122,30,30,.08), transparent 55%),
        linear-gradient(180deg, var(--bg1), var(--bg0));
    }

    /* grit overlay */
    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      opacity:100;
      background: url("/images/backgrounds/register.webp") center center / cover no-repeat;

    }

    .box{
      width: min(440px, 92vw);
      padding: 22px 20px 18px;
      border-radius: 14px;
      text-align:center;
      position:relative;

      border: 1px solid rgba(43,52,64,.95);
      background:
        radial-gradient(900px 260px at 18% 0%, rgba(182,75,46,.12), transparent 60%),
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(0,0,0,.22)),
        linear-gradient(180deg, var(--panel), var(--panel2));

      box-shadow: 0 18px 40px rgba(0,0,0,.65), inset 0 1px 0 rgba(255,255,255,.06);
      animation: fadeIn 1.0s ease;
    }

    .box::before{
      content:"";
      position:absolute;
      inset:10px;
      pointer-events:none;
      border: 0;
      border-radius: 12px;
    }

    .box::after{
      content:"";
      position:absolute;
      inset:-40px;
      border-radius:18px;
      z-index:-1;

      background:
        radial-gradient(circle at center,
          rgba(0,0,0,.75) 0%,
          rgba(0,0,0,.55) 40%,
          transparent 75%
        );
    }

    @keyframes fadeIn{
      from{ opacity:0; transform: translateY(12px); }
      to{ opacity:1; transform: translateY(0); }
    }

    h2{
      margin: 0 0 14px;
      letter-spacing: 2.6px;
      text-transform: uppercase;
      color: var(--bone);
      text-shadow:
        0 0 10px rgba(182,75,46,.20),
        0 10px 18px rgba(0,0,0,.85);
      font-size: 20px;
      position:relative;
      z-index:1;
    }

    input, select, button{
      display:block;
      width:100%;
      margin: 10px auto;
      text-align:center;
      position:relative;
      z-index:1;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    input, select{
      padding: 11px 12px;
      border-radius: 10px;

      background: rgba(0,0,0,.22);
      border: 1px solid rgba(43,52,64,.95);
      color: var(--ink);

      box-shadow:
        inset 0 0 12px rgba(0,0,0,.75),
        inset 0 1px 0 rgba(255,255,255,.05);
      outline:none;
      font-size: 14px;
    }

    input::placeholder{ color: rgba(154,163,175,.85); }

    input:focus, select:focus{
      border-color: rgba(182,75,46,.55);
      box-shadow:
        0 0 0 1px rgba(182,75,46,.12),
        inset 0 0 12px rgba(0,0,0,.75),
        inset 0 1px 0 rgba(255,255,255,.05);
    }

    /* Select arrow — keep it simple and clean */
    select{
      appearance:none;
      background-image:
        linear-gradient(45deg, transparent 50%, rgba(215,219,226,.85) 50%),
        linear-gradient(135deg, rgba(215,219,226,.85) 50%, transparent 50%);
      background-position:
        calc(100% - 18px) calc(50% - 3px),
        calc(100% - 12px) calc(50% - 3px);
      background-size: 6px 6px;
      background-repeat: no-repeat;
      padding-right: 30px;
      cursor:pointer;
    }

    button{
      padding: 12px;
      margin-top: 14px;
      border-radius: 10px;

      border: 1px solid rgba(182,75,46,.55);
      background: linear-gradient(180deg, rgba(182,75,46,.92), rgba(122,30,30,.88));
      color: #f3e7db;

      font-weight: 900;
      font-size: 13px;
      letter-spacing: .7px;
      text-transform: uppercase;

      cursor:pointer;
      transition: .12s ease;
      box-shadow: 0 14px 28px rgba(0,0,0,.65), inset 0 1px 0 rgba(255,255,255,.12);
    }

    button:hover{
      filter: brightness(1.06);
      transform: translateY(-1px);
    }

    button:active{
      transform: translateY(0) scale(.99);
    }

    #msg{
      margin-top: 10px;
      min-height: 18px;
      font-size: 13px;
      color: #ffd6d6;
      text-shadow: 0 0 3px black;
      position:relative;
      z-index:1;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    .login-link{
      margin-top: 14px;
      position:relative;
      z-index:1;
    }

    .login-link a{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding: 8px 10px;

      border-radius: 10px;
      border: 1px solid rgba(43,52,64,.95);
      background: rgba(0,0,0,.18);

      color: var(--ink);
      text-decoration:none;

      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .5px;
      text-transform: uppercase;

      box-shadow: inset 0 1px 0 rgba(255,255,255,.06);
      transition: .12s ease;
    }

    .login-link a:hover{
      border-color: rgba(182,75,46,.45);
      transform: translateY(-1px);
    }

/* --- CLASS INFO PANEL --- */
.class-panel{
  margin-top: 14px;
  padding: 15px 14px 13px;
  border-radius: 14px;
  border: 1px solid rgba(200,163,75,.18);

  background:
    radial-gradient(520px 160px at 50% 0%, rgba(200,163,75,.12), transparent 58%),
    radial-gradient(420px 180px at 18% 8%, rgba(182,75,46,.13), transparent 62%),
    linear-gradient(180deg, rgba(255,255,255,.035), rgba(0,0,0,.28)),
    rgba(7,10,14,.82);

  box-shadow:
    0 16px 34px rgba(0,0,0,.45),
    inset 0 1px 0 rgba(255,255,255,.06),
    inset 0 0 0 1px rgba(255,255,255,.025);

  position:relative;
  z-index:20;
  text-align:center;
  overflow:visible;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
}

.class-panel::before{
  content:"";
  position:absolute;
  left:14px;
  right:14px;
  top:12px;
  height:1px;
  background:linear-gradient(90deg, transparent, rgba(200,163,75,.38), transparent);
  pointer-events:none;
}

.class-title{
  font-family:'Cinzel', ui-serif, Georgia, "Times New Roman", serif;
  letter-spacing:1.7px;
  text-transform:uppercase;
  color:var(--bone);
  font-size:13px;
  font-weight:900;
  margin:4px 0 5px;
  text-align:center;
  text-shadow:0 8px 18px rgba(0,0,0,.75);
}

#classTitle{
  font-size:16px;
  color:#e2cfa9;
}

.class-tagline{
  color:rgba(215,219,226,.78);
  font-size:12px;
  line-height:1.45;
  margin:0 auto 12px;
  max-width:360px;
  text-align:center;
}

.class-grid{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:9px;
}

.class-block{
  padding:10px 9px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.07);

  background:
    linear-gradient(180deg, rgba(255,255,255,.035), rgba(0,0,0,.20)),
    rgba(0,0,0,.22);

  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.045),
    0 8px 18px rgba(0,0,0,.22);

  text-align:center;
}

.class-label{
  font-family:'Cinzel', ui-serif, Georgia, "Times New Roman", serif;
  color:rgba(200,163,75,.92);
  font-size:10px;
  letter-spacing:.9px;
  text-transform:uppercase;
  font-weight:900;
  margin-bottom:5px;
}

.class-value{
  color:rgba(215,219,226,.92);
  font-size:11px;
  font-weight:700;
  line-height:1.35;
}

.class-stats{
  margin-top:12px;
  padding-top:10px;
  border-top:1px solid rgba(255,255,255,.06);
}

.stats-row{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:8px;
  margin-top:9px;
}

.stat-chip{
  position:relative;
  overflow: visible; /* important */
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:7px;

  padding:7px 9px;
  min-height:32px;
  border-radius:999px;

  border:1px solid rgba(200,163,75,.13);
  background:
    linear-gradient(180deg, rgba(255,255,255,.035), rgba(0,0,0,.20)),
    rgba(0,0,0,.24);

  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.045),
    0 8px 16px rgba(0,0,0,.18);

  cursor:help;
  user-select:none;
}

.stat-chip:hover{
  border-color:rgba(200,163,75,.38);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.06),
    0 0 14px rgba(200,163,75,.14),
    0 8px 16px rgba(0,0,0,.24);
}

.stat-name{
  font-family:'Cinzel', ui-serif, Georgia, "Times New Roman", serif;
  font-size:10px;
  letter-spacing:.7px;
  text-transform:uppercase;
  color:rgba(200,163,75,.88);
  font-weight:900;
}

.stat-val{
  font-size:12px;
  font-weight:900;
  color:#f1e7d6;
}

.scaling-row{
  margin-top:11px;
  padding-top:11px;
  border-top:1px solid rgba(255,255,255,.055);
  font-size:12px;
  display:flex;
  justify-content:center;
}

.tip{
  position:absolute;
  left:50%;
  top:calc(100% + 10px);
  width:240px;
  padding:10px;
  border-radius:12px;

  background: #090c10;
  border:1px solid rgba(200,163,75,.22);
  box-shadow:0 18px 40px rgba(0,0,0,.75), inset 0 1px 0 rgba(255,255,255,.06);

  color:var(--ink);
  font-size:11px;
  line-height:1.35;
  text-align:left;

  opacity:0;
  visibility:hidden;
  pointer-events:none;

  transform:translateX(-50%) translateY(-4px);
  transition:opacity .15s ease, visibility .15s ease, transform .15s ease;
  z-index:9999;
}
.stat-chip:hover .tip{
  opacity:1;
  visibility:visible;
  transform:translateX(-50%) translateY(0);
}
.tip-title{
  font-family:'Cinzel', ui-serif, Georgia, "Times New Roman", serif;
  color:var(--bone);
  font-weight:900;
  letter-spacing:.6px;
  margin-bottom:6px;
}

.tip-body{
  color:rgba(215,219,226,.92);
}
    /* responsive: stack blocks on small screens */
    @media (max-width: 420px){
      .class-grid{ grid-template-columns: 1fr; }
      .box{ padding: 18px 16px 16px; }
      h2{ font-size: 18px; letter-spacing: 2px; }
    }
  </style>
</head>

<body>
  <div class="box">
    <h2>Create Adventurer</h2>

    <input id="name" placeholder="Username">
    <input id="email" placeholder="Email">

    <select id="class">
      <option disabled selected>Loading Classes...</option>
    </select>


    <input type="password" id="pass1" placeholder="Password">
    <input type="password" id="pass2" placeholder="Confirm Password">

    <!-- Class panel moved directly under class selection -->
    <div class="class-panel" id="classPanel" aria-live="polite">
      <div class="class-title" id="classTitle">Choose your path</div>
      <div class="class-tagline" id="classTagline">A name alone does not forge a legend.</div>

      <div class="class-grid">
        <div class="class-block">
          <div class="class-label">Role</div>
          <div class="class-value" id="classRole">—</div>
        </div>

        <div class="class-block">
          <div class="class-label">Strengths</div>
          <div class="class-value" id="classStrengths">—</div>
        </div>

        <div class="class-block">
          <div class="class-label">Weakness</div>
          <div class="class-value" id="classWeakness">—</div>
        </div>
      </div>

      <div class="class-stats">
        <div class="class-title" style="margin-top:10px;">Starting Attributes</div>

        <div class="stats-row" id="statsRow"></div>

        <div class="scaling-row">
          <div class="stat-chip">
            <span class="stat-name">Damage Scaling</span>
            <span class="stat-val" id="damageScaling">—</span>
            <div class="tip">
              <div class="tip-title">Damage Scaling</div>
              <div class="tip-body" id="damageScalingTip">
                Determines which attribute increases the damage of your attacks and skills.
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>


    <button onclick="register()">Forge Character</button>

    <div id="msg"></div>

    <div class="login-link">
      <a href="/login.html">Return to Gate</a>
    </div>
  </div>

  <script>
    // Flavor (front-end)
    const CLASS_INFO = {
      Warrior: {
        title: "Warrior",
        tagline: "A disciplined shield between the realm and ruin.",
        role: "Tank",
        strengths: "🛡 High Defense, ❤️ Strong HP, ⚔ Reliable frontline damage",
        weakness: "🐢 Slower actions and lower burst"
      },

      Berserker: {
        title: "Berserker",
        tagline: "Bloodied, unbroken, and impossible to ignore.",
        role: "Tank",
        strengths: "⚔ High Attack, 🩸 Self-sustain, 🎯 Critical pressure",
        weakness: "🛡 Lower mitigation, riskier tanking style"
      },

      Ranger: {
        title: "Ranger",
        tagline: "Swift hunter of the wild roads—strike, vanish, repeat.",
        role: "Damage",
        strengths: "🏃 High Agility (faster turns), 🎯 Precision damage, ⚔ Consistency",
        weakness: "❤️ Low survivability if focused"
      },

      Marksman: {
        title: "Marksman",
        tagline: "One shot. One breath. One legend carved at range.",
        role: "Damage",
        strengths: "🎯 High critical potential, ⚔ Burst damage windows, 🧠 Tactical timing",
        weakness: "🛡 Weak defenses, punished if mistimed"
      },

      Mage: {
        title: "Mage",
        tagline: "Arcane power shaped into purpose—bright, dangerous, absolute.",
        role: "Damage",
        strengths: "🧠 High Intellect scaling, ⚔ Powerful spells, ✨ Utility options",
        weakness: "❤️ Very fragile, relies on positioning and timing"
      },

      Warlock: {
        title: "Warlock",
        tagline: "Power taken, not given. Every spell has a price.",
        role: "Damage",
        strengths: "☠ Damage over time, ✨ Debuffs & pressure, 🧠 Sustained damage",
        weakness: "❤️ Risky sustain, slower burst"
      },

      Cleric: {
        title: "Cleric",
        tagline: "Faith made steel. Keep allies standing when all else fails.",
        role: "Support",
        strengths: "✨ Healing, 🛡 Defensive utility, ❤️ High sustain",
        weakness: "⚔ Low damage output"
      },

      Druid: {
        title: "Druid",
        tagline: "Nature answers those who listen—roots, storms, renewal.",
        role: "Support",
        strengths: "✨ Sustained healing, ⚔ Flexible damage, 🧠 Adaptability",
        weakness: "🎯 Lower burst impact"
      }
    };

    // Stat explanations (tooltips) — now includes HP/SP
    const STAT_DEFS = {
      attack: {
        label: "Attack",
        desc: "Increases damage of basic attacks."
      },

      defense: {
        label: "Defense",
        desc: "Reduces incoming damage through mitigation. Higher Defense lowers damage taken."
      },

      agility: {
        label: "Agility",
        desc: "Increases ATB gauge recovery speed, dodge chance and critical hit chance."
      },

      vitality: {
        label: "Vitality",
        desc: "Increases maximum HP and improves overall survivability in combat."
      },

      intellect: {
        label: "Intellect",
        desc: "Increases maximum mana and spell critical hit chance."
      },

      crit: {
        label: "Critical",
        desc: "Chance that an attack will do bonus damage."
      },

      hpoints: {
        label: "HP",
        desc: "Health Points. When this reaches 0, you are defeated."
      },

      spoints: {
        label: "SP",
        desc: "Mana used to cast abilities. "
      }    };

    // DB rows keyed by class name
    const DB_CLASSES = new Map();

    // Damage scaling rule (front-end). Recommended: move to DB as damage_stat later.
    function getDamageScalingStat(className) {
      const melee = ["Warrior","Berserker","Ranger","Marksman"];
      const caster = ["Mage","Warlock","Cleric","Druid"];

      if (melee.includes(className)) return "Attack";
      if (caster.includes(className)) return "Intellect";
      return "Attack";
    }

    function renderStatsFromDb(dbRow) {
      const statsRow = document.getElementById("statsRow");
      if (!dbRow) { statsRow.innerHTML = ""; return; }

      const statPairs = [
        ["attack", dbRow.attack],
        ["defense", dbRow.defense],
        ["agility", dbRow.agility],
        ["vitality", dbRow.vitality],
        ["intellect", dbRow.intellect],
        ["crit", dbRow.crit],
        ["hpoints", dbRow.hpoints],
        ["spoints", dbRow.spoints]
      ];

      statsRow.innerHTML = statPairs.map(([key, val]) => {
        const def = STAT_DEFS[key];
        const safeVal = (val ?? 0);
        const shownVal = (key === "crit") ? `${safeVal}%` : safeVal;

        return `
          <div class="stat-chip">
            <span class="stat-name">${def.label}</span>
            <span class="stat-val">${shownVal}</span>
            <div class="tip">
              <div class="tip-title">${def.label}</div>
              <div class="tip-body">${def.desc}</div>
            </div>
          </div>
        `;
      }).join("");
    }

    function setClassPanel(className) {
      const info = CLASS_INFO[className];

      document.getElementById("classTitle").textContent = info?.title || className || "Choose your path";
      document.getElementById("classTagline").textContent = info?.tagline || "A name alone does not forge a legend.";
      document.getElementById("classRole").textContent = info?.role || "—";
      document.getElementById("classStrengths").textContent = info?.strengths || "—";
      document.getElementById("classWeakness").textContent = info?.weakness || "—";

      const dbRow = DB_CLASSES.get(className);
      renderStatsFromDb(dbRow);

      const scale = getDamageScalingStat(className);
      document.getElementById("damageScaling").textContent = scale;

      document.getElementById("damageScalingTip").textContent =
        scale === "Attack"
          ? "Your weapon attacks and physical skills gain additional damage from Attack."
          : "Your spells and magical skills gain additional damage from Intellect.";
    }

    async function loadClasses() {
      try {
        const res = await fetch("/api/classes");
        const classes = await res.json();

        DB_CLASSES.clear();
        classes.forEach(c => DB_CLASSES.set(c.name, c));

        const select = document.getElementById("class");
        select.innerHTML = "";

        classes.forEach(c => {
          const opt = document.createElement("option");
          opt.value = c.name;
          opt.textContent = c.name;
          select.appendChild(opt);
        });

        setClassPanel(select.value);
        select.addEventListener("change", () => setClassPanel(select.value));
      } catch (err) {
        console.error("Failed to load classes", err);
        document.getElementById("class").innerHTML = "<option>Error loading classes</option>";
        setClassPanel("");
      }
    }

    window.addEventListener("DOMContentLoaded", loadClasses);
  </script>

  <script>
    async function register() {
      const name = document.getElementById("name").value;
      const email = document.getElementById("email").value;
      const password = document.getElementById("pass1").value;
      const confirm = document.getElementById("pass2").value;
      const pclass = document.getElementById("class").value;

      const res = await fetch("/api/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, email, password, confirm, pclass })
      });

      const data = await res.json();

      document.getElementById("msg").innerText =
        data.error || "✅ Adventurer created. Redirecting...";

      if (data.success) {
        setTimeout(() => window.location = "/login.html", 1200);
      }
    }
  </script>
</body>
</html>
